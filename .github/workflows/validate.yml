name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  validate-hacs:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration

  validate-hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check"
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio "pytest-homeassistant-custom-component" "cloudflare>=4.0.0" \
            hassil home-assistant-intents mutagen ha-ffmpeg
      - name: Run unit tests
        run: >
          pytest tests/test_client.py
          tests/test_config_flow.py
          tests/test_stt.py::TestSTTModelProfiles
          tests/test_stt.py::TestResponseParsing
          tests/test_stt.py::TestWavHeader
          tests/test_tts.py::TestModelProfiles
          tests/test_tts.py::TestFormatDetection
          tests/test_conversation.py::TestResponseParsing
          tests/test_conversation.py::TestToolCallParsing
          tests/test_conversation.py::TestTokenUsageTracking
          -v
